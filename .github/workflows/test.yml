name: Testing

on:
  push:
    branches:
      - "**"
  pull_request:
    branches:
      - "**"
  workflow_dispatch:

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            name: windows-x64
          - os: windows-11-arm
            name: windows-arm
          - os: ubuntu-latest
            name: linux-x64
          - os: ubuntu-24.04-arm
            name: linux-arm64
          - os: macos-latest
            name: macos-arm64
          - os: macos-15
            name: macos-x64

    runs-on: ${{ matrix.os }}
    name: Test on (${{ matrix.name }})
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup uv
        uses: astral-sh/setup-uv@v6
        with:
          activate-environment: true

      - name: Install dependencies
        run: uv sync

      - name: Run test with retry
        id: test
        shell: pwsh
        run: |
          $maxRetries = 5
          $retryCount = 0
          $success = $false

          while ($retryCount -lt $maxRetries) {
            Write-Host "Attempt $($retryCount + 1) of $maxRetries"
            try {
              uv run poe test -n 8
              Write-Host "Tests passed!"
              $success = $true
              break
            }
            catch {
              Write-Warning "Tests failed, retrying..."
              $retryCount++
            }
          }

          if (-not $success) {
            Write-Error "Tests failed $maxRetries times in a row"
            exit 1
          }

#:schema ./schema.json
# relative schema location for ease

[interface]
tooltips = true
nerd_font = true
use_reactive_layout = true
show_progress_eta = false
show_progress_percentage = true
truncate_progress_file_path = false
show_line_numbers = true
show_hidden_files = false
allow_tab_nav = true
append_new_tabs = true
double_click_delay = 0.25
drive_watcher_frequency = 3.0
# yazi style is 5
# but it has more space
scrolloff = 3

[interface.image_viewer]
protocol = "Auto"
max_size = [4000, 4000]

[interface.font_preview]
max_size = [1000, 1000]
font_size = 50

[interface.preview_text]
error = "couldn't read this file! (\u00AC_\u00AC)" # ¬_¬
start = """
  ___ ___
 |  _| . |
 |_| |___|
  _ _ ___
 | | |  _|
  \\_/|_|
"""
font_text = """
abcdefghijklmnopqrstuvwxyz
ABCDEFGHIJKLMNOPQRSTUVWXYZ
oO08 iIlL1 g9qCQG a@ 5sS
{} [==>  ] (*) <> ~-+ /\\
"""

[interface.clock]
enabled = true
align = "left"

[interface.compact_mode]
buttons = true
panels = false

[interface.mime_rules]
"text/.*" = "text"
"application/(json|javascript|xml|raml\\+yaml)" = "text"
"application/x-(yaml|script|pem-file|subrip|typescript)" = "text"
"application/(mbox|ndjson|wine-extension-ini)" = "text"
"image/svg\\+xml" = "resvg"
"image/(avif|hei.|jxl)" = "image"
"image/.*" = "image"
"application/pdf" = "pdf"
"application/(zip|gzip|zstd|bzip2|vnd\\.rar)" = "archive"
"application/x-(xz|x-tar|x-gzip|x-bzip2|x-xz|x-rar|x-rar-compressed|x-7z-compressed)" = "archive"
"application/(rar|7z.*|tar|xz|bzip.*|lzma|compress|archive|cpio|arj|xar|ms-cab.*)" = "archive"
"application/(iso9660-image|qemu-disk|ms-wim|apple-diskimage)" = "archive"
"application/virtualbox-(vhd|vhdx)" = "archive"
"application/(debian.*-package|redhat-package-manager|rpm|android\\.package-archive)" = "archive"
"inode/directory" = "folder"
"font/.*" = "font"
"application/ms-opentype" = "font"
"application/font-.*" = "font"
"application/x-font-.*" = "font"

[settings]
copy_includes_metadata = true
use_recycle_bin = true

[settings.bulk_rename]
show_as_mapping = true

[settings.editor]
open_all_in_editor = false

[settings.editor.file]
run = "$EDITOR"
block = false
suspend = true

[settings.editor.folder]
run = "$EDITOR"
block = false
suspend = true

[settings.editor.bulk_rename]
run = "$EDITOR"
suspend = true

[metadata]
fields = [
  "type",
  "permissions",
  "size",
  "modified",
  "accessed",
  "created",
  "hidden",
]
datetime_format = "%Y-%m-%d %H:%M"
filesize_decimals = 1
filesize_suffix = "decimal"

[theme]
default = "nord"
preview = "nord"
transparent = false

[[custom_theme]]
name = "nord"
primary = "#88C0D0"
secondary = "#81A1C1"
accent = "#B48EAD"
foreground = "#D8DEE9"
background = "#2E3440"
success = "#A3BE8C"
warning = "#EBCB8B"
error = "#BF616A"
surface = "#3B4252"
panel = "#434C5E"
is_dark = true

[custom_theme.bar_gradient]
default = ["#88c0d0", "#5e81ac"]
error = ["#bf616a", "#d08770"]

[[custom_theme]]
name = "Dark Pink"
primary = "#FD7AFF"
secondary = "#000F85"
success = "#FF007B"
warning = "#250069"
error = "#300025"
accent = "#000000"
foreground = "#FFFFFF"
background = "#000000"
surface = "#FD7AFF"
panel = "#2b2b2b"
is_dark = true

[custom_theme.variables]
"block-cursor-background" = "#88C0D0"
"block-cursor-foreground" = "#2E3440"
"block-cursor-text-style" = "none"
"footer-key-foreground" = "#88C0D0"
"input-selection-background" = "#81a1c1 35%"
"button-color-foreground" = "#2E3440"
"button-focus-text-style" = "reverse"

[keybinds]
# For keybind profiles, see keybinds/sane.toml and keybinds/vim.toml
# The default configuration below combines both styles for maximum flexibility.
# Users can copy their preferred profile to their config directory.
toggle_pin = ["P"]
toggle_pinned_sidebar = ["S"]
toggle_preview_sidebar = ["I"]
toggle_footer = ["F"]
toggle_menu_wrapper = ["M"]
focus_toggle_pinned_sidebar = ["s"]
focus_file_list = ["escape"]
focus_toggle_preview_sidebar = ["i"]
focus_toggle_path_switcher = ["ctrl+l"]
focus_search = ["slash"]
focus_toggle_processes = ["#"]
focus_toggle_clipboard = ["c"]
focus_toggle_metadata = ["m"]
copy = ["y", "ctrl+c"]
paste = ["p", "ctrl+v"]
cut = ["x", "ctrl+x"]
delete = ["d", "delete"]
rename = ["r", "f2"]
new = ["ctrl+n", "o"]
zip = ["E"]
unzip = ["ctrl+e"]
# id love to use ctrl+shift+c
# but that is taken by terminals
up = ["up", "k"]
down = ["down", "j"]
up_tree = ["left", "h"]
down_tree = ["right", "l", "enter"]
bypass_up_tree = ["H"]
bypass_down_tree = ["L"]
page_up = ["pageup", "ctrl+b"]
page_down = ["pagedown", "ctrl+f"]
home = ["home", "g"]
end = ["end", "G"]
hist_previous = ["backspace", "u"]
hist_next = ["space"]
toggle_visual = ["v"]
toggle_all = ["%", "ctrl+a"]
toggle_hidden_files = ["full_stop"]
select_up = ["shift+up", "K"]
select_down = ["shift+down", "J"]
select_page_up = ["shift+pageup"]
select_page_down = ["shift+pagedown"]
select_home = ["shift+home"]
select_end = ["shift+end"]
tab_next = ["ctrl+j"]
tab_previous = ["ctrl+k"]
tab_new = ["n"]
tab_close = ["w"]
show_keybinds = ["?"]
quit_app = ["q", "ctrl+q"]
command_palette = "ctrl+p"
suspend_process = ["ctrl+z"]
open_editor = ["e"]
show_shell_screen = [">"]
# unavailable for now
preview_select_left = []
preview_select_right = []
preview_scroll_left = []
preview_scroll_right = []
[keybinds.extra_copy]
open_popup = ["Y"]
copy_to_rovr = ["y"]
copy_single_path = ["p"]
copy_to_system_clip = ["s"]
copy_current_directory = ["d"]
[keybinds.change_sort_order]
open_popup = [","]
name = ["a"]
extension = ["e"]
natural = ["n"]
size = ["s"]
created = ["c"]
modified = ["m"]
descending = ["d"]
[keybinds.delete_files]
trash = ["d"]
delete = ["x"]
cancel = ["c", "escape"]
[keybinds.filename_conflict]
overwrite = ["o"]
skip = ["s"]
rename = ["r"]
cancel = ["c", "escape"]
dont_ask_again = ["a"]
[keybinds.file_in_use]
retry = ["r"]
skip = ["s"]
cancel = ["c", "escape"]
dont_ask_again = ["a"]
[keybinds.filter_modal]
exit = ["escape"]
down = ["down", "ctrl+j"]
up = ["up", "ctrl+k"]
[keybinds.yes_or_no]
yes = ["y"]
no = ["n", "escape"]
dont_ask_again = ["a"]

[keys]
[keys."-app"]
"P" = "toggle_pin"
"S" = "toggle_pinned_sidebar"
"I" = "toggle_preview_sidebar"
"F" = "toggle_footer"
"M" = "toggle_menu_wrapper"
"s" = "focus_toggle_pinned_sidebar"
"escape" = "focus_file_list"
"i" = "focus_toggle_preview_sidebar"
"ctrl+l" = "focus_toggle_path_switcher"
"#" = "focus_toggle_processes"
"c" = "focus_toggle_clipboard"
"m" = "focus_toggle_metadata"
"ctrl+j" = "tab_next"
"ctrl+k" = "tab_previous"
"n" = "tab_new"
"w" = "tab_close"
"?" = "show_keybinds"
"ctrl+p" = "command_palette"
"ctrl+z" = "suspend_process"
[keys.FileList]
"up" = "focused=#file_list:up"
"down" = "focused=#file_list:down"
"k" = "focused=#file_list:up"
"j" = "focused=#file_list:down"
"left" = "focused=#file_list:up_tree"
"right" = "focused=#file_list:down_tree"
"h" = "focused=#file_list:up_tree"
"l" = "focused=#file_list:down_tree"
"enter" = "focused=#file_list:down_tree"
"H" = "focused=#file_list:bypass_up_tree"
"L" = "focused=#file_list:bypass_down_tree"
"pageup" = "focused=#file_list:page_up"
"ctrl+b" = "focused=#file_list:page_up"
"pagedown" = "focused=#file_list:page_down"
"ctrl+f" = "focused=#file_list:page_down"
"home" = "focused=#file_list:home"
"g" = "focused=#file_list:home"
"end" = "focused=#file_list:end"
"G" = "focused=#file_list:end"

[keys."#file_list"]
"slash" = "focused=#file_list:focus_search"
"y" = "focused=#file_list:copy"
"ctrl+c" = "focused=#file_list:copy"
"p" = "focused=#file_list:paste"
"x" = "focused=#file_list:cut"
"d" = "focused=#file_list:delete"
"r" = "focused=#file_list:rename"
"f2" = "focused=#file_list:rename"
"ctrl+n" = "focused=#file_list:new"
"o" = "focused=#file_list:new"
"E" = "focused=#file_list:zip"
"ctrl+e" = "focused=#file_list:unzip"
"backspace" = "focused=#file_list:hist_previous"
"u" = "focused=#file_list:hist_previous"
"space" = "focused=#file_list:hist_next"
"v" = "focused=#file_list:toggle_visual"
"%" = "focused=#file_list:toggle_all"
"ctrl+a" = "focused=#file_list:toggle_all"
"shift+up" = "focused=#file_list:select_up"
"shift+down" = "focused=#file_list:select_down"
"shift+pageup" = "focused=#file_list:select_page_up"
"shift+pagedown" = "focused=#file_list:select_page_down"
"shift+home" = "focused=#file_list:select_home"
"shift+end" = "focused=#file_list:select_end"
"e" = "focused=#file_list:open_editor"
">" = "focused=#file_list:show_shell_screen"
[keys.PinnedSidebar]
"slash" = "focused=#pinned_sidebar:focus_search"
[keys.PreviewContainer]
"alt+j" = "down"
"alt+k" = "up"
"up" = "focused=#preview_container:up"
"down" = "focused=#preview_container:down"
"j" = "focused=#preview_container:down"
"k" = "focused=#preview_container:up"
"pageup" = "focused=#preview_container:page_up"
"ctrl+b" = "focused=#preview_container:page_up"
"pagedown" = "focused=#preview_container:page_down"
"ctrl+f" = "focused=#preview_container:page_down"

[keys.CopyPanelOptions]
"Y" = "focused=#copy_panel:open_popup"
"y" = "focused=#copy_panel:copy_to_rovr"
"p" = "focused=#copy_panel:copy_single_path"
"s" = "focused=#copy_panel:copy_to_system_clip"
"d" = "focused=#copy_panel:copy_current_directory"
[keys.SortOrderPopup]
# reminder to anyone reading this, you dont need it to
# be focused, as long as sort order is available, you can
# trigger these keybinds. but it makes more sense to
# require focus, else what is the point of the popup?
"," = "focused=#sort_order_popup:open_popup"
"a" = "focused=#sort_order_popup:change_sort_order_name"
"e" = "focused=#sort_order_popup:change_sort_order_extension"
"n" = "focused=#sort_order_popup:change_sort_order_natural"
"s" = "focused=#sort_order_popup:change_sort_order_size"
"c" = "focused=#sort_order_popup:change_sort_order_created"
"m" = "focused=#sort_order_popup:change_sort_order_modified"
"d" = "focused=#sort_order_popup:change_sort_order_descending"
[keys."-screen:DeleteFiles"]
# this one doesn't need focused; because it's a screen itself
"d" = "trash"
"x" = "delete"
"c" = "cancel"
[keys."-screen:FileNameConflict"]
"o" = "overwrite"
"s" = "skip"
"r" = "rename"
"c" = "cancel"
"a" = "dont_ask_again"
[keys."-screen:FileInUse"]
"r" = "retry"
"s" = "skip"
[keys."-screen:YesOrNo"]
"y" = "yes"
"n" = "no"
"a" = "dont_ask_again"
[keys."-screen:ModalSearchScreen"]
"escape" = "dismiss"
"up" = "focused=Input:previous_option"
"ctrl+k" = "focused=Input:previous_option"
"down" = "focused=Input:next_option"
"ctrl+j" = "focused=Input:next_option"
# future me: also consider something like [keys."-focused"] to target whatever is focused
#          don't add selectors for that please ╶┴────────┘

[plugins.zoxide]
enabled = true
keybinds = ["z"]
show_scores = false

[plugins.bat]
enabled = false
executable = "bat"

[plugins.fd]
enabled = true
keybinds = ["f"]
executable = "fd"
relative_paths = true
follow_symlinks = false
no_ignore_parent = false
default_filter_types = ["file", "directory"]

[plugins.rg]
enabled = true
keybinds = ["\\"]
executable = "rg"
case_sensitive = true
no_ignore_parent = false
follow_symlinks = false
search_hidden = false

[plugins.poppler]
enabled = true
threads = 1
use_pdftocairo = false
poppler_folder = ""
pdf_batch_size = 2

[plugins.file_one]
enabled = false
get_description = true
